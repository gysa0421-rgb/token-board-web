<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Token Board" />
  <meta name="theme-color" content="#EDEDED" />
  <meta name="description" content="Token board for kids — stars, timers, and reward images." />
  <title>Token Board</title>
  <link rel="apple-touch-icon" href="assets/splash-icon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="app">
    <div id="loading-screen" class="loading-screen">
      <div class="spinner" aria-hidden="true"></div>
    </div>

    <main id="main-screen" class="main-screen hidden">
      <header class="top-bar">
        <button id="settings-btn" class="settings-btn" type="button" aria-label="Parent settings">⚙</button>
      </header>

      <section class="reinforcer-section">
        <img id="reinforcer-image" class="reinforcer-image hidden" alt="Reward image" />
        <div id="reinforcer-placeholder" class="reinforcer-placeholder">
          <img src="assets/splash-icon.png" alt="" class="placeholder-icon" />
        </div>
      </section>

      <section id="stars-row" class="stars-row" aria-label="Star tokens"></section>

      <section id="controls" class="controls">
        <div id="lock-row-host"></div>
        <div id="buttons-wrap" class="buttons-wrap locked">
          <div id="button-blocker" class="button-blocker" hidden></div>
          <div id="unlocked-actions" class="unlocked-actions" hidden>
            <button id="lock-again-btn" class="text-btn" type="button">🔒 Lock Again</button>
            <button id="reset-board-btn" class="action-btn reset-board" type="button">Reset Board</button>
          </div>
          <button id="award-star-btn" class="action-btn award is-disabled" type="button" aria-disabled="true">+1 Star</button>
          <button id="deduct-star-btn" class="action-btn deduct is-disabled" type="button" aria-disabled="true">-1 Star</button>
        </div>
      </section>
    </main>

    <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="modal-sheet">
        <header class="modal-header">
          <h2 id="settings-title">Parent Settings</h2>
          <button id="settings-close" class="done-btn" type="button">Done</button>
        </header>
        <div id="settings-body" class="modal-body"></div>
      </div>
    </div>

    <div id="celebration" class="celebration hidden" role="dialog" aria-label="Celebration">
      <div id="celebration-fx" class="celebration-fx" aria-hidden="true"></div>
      <div class="celebration-stars" aria-hidden="true">
        <span class="celebration-star star-1">★</span>
        <span class="celebration-star star-2">★</span>
        <span class="celebration-star star-3">★</span>
        <span class="celebration-star star-4">★</span>
        <span class="celebration-star star-5">★</span>
        <span class="celebration-star star-6">★</span>
      </div>
      <div class="celebration-badge">
        <div class="celebration-title">Good Job!</div>
        <div class="celebration-reward-label">Your Reward</div>
        <div class="celebration-reward-frame">
          <img id="celebration-reward-image" class="celebration-reward-image hidden" alt="Your reward" />
          <div id="celebration-reward-placeholder" class="celebration-reward-placeholder">
            <img src="assets/splash-icon.png" alt="" class="celebration-reward-fallback" />
          </div>
        </div>
        <div class="celebration-subtitle">You did it! 🎉</div>
      </div>
      <p class="celebration-hint">Tap anywhere to continue</p>
    </div>
  </div>

  <input id="photo-input" type="file" accept="image/*" capture="environment" class="hidden-input" />
  <input id="library-input" type="file" accept="image/*" class="hidden-input" />

  <script type="module" src="js/app.js?v=4"></script>
</body>
</html>
